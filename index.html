<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Hunt Dashboard</title>
<style>
:root { color-scheme: light; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f6f8fa; color: #1f2328; line-height: 1.5; padding: 20px; }

.header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
.header h1 { font-size: 20px; font-weight: 700; }
.header .sub { font-size: 13px; color: #656d76; margin-top: 3px; }
.btn { background: #f6f8fa; border: 1px solid #d0d7de; color: #24292f; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; }
.btn:hover { background: #eaeef2; }

.stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 20px; }
.stat { background: #fff; border: 1px solid #d0d7de; border-radius: 10px; padding: 16px; }
.stat .lbl { font-size: 11px; color: #656d76; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
.stat .val { font-size: 28px; font-weight: 700; margin: 6px 0 2px; }
.stat .sub { font-size: 11px; color: #8c959f; }

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.grid-3-2 { display: grid; grid-template-columns: 3fr 2fr; gap: 12px; margin-top: 12px; }

.card { background: #fff; border: 1px solid #d0d7de; border-radius: 10px; padding: 16px; }
.card-hd { font-size: 14px; font-weight: 600; color: #1f2328; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; }
.live-badge { font-size: 11px; color: #1a7f37; background: #dafbe1; border: 1px solid #aceebb; padding: 2px 9px; border-radius: 20px; font-weight: 500; }

.chart-wrap { position: relative; height: 200px; }

.email-list { display: flex; flex-direction: column; gap: 8px; max-height: 340px; overflow-y: auto; }
.email-item { border: 1px solid #d0d7de; border-radius: 8px; padding: 10px 12px; }
.email-subj { font-size: 13px; font-weight: 600; color: #1f2328; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.email-snip { font-size: 12px; color: #656d76; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin: 2px 0; }
.email-meta { font-size: 11px; color: #8c959f; }

.badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
.b-applied { background: #ddf4ff; color: #0969da; border: 1px solid #54aff9; }
.b-rejected { background: #ffebe9; color: #cf222e; border: 1px solid #ff8182; }
.b-interview { background: #dafbe1; color: #1a7f37; border: 1px solid #4ac26b; }
.b-offer { background: #fff8c5; color: #9a6700; border: 1px solid #d4a72c; }
.b-new { background: #f6f8fa; color: #656d76; border: 1px solid #d0d7de; }
.b-yes { background: #dafbe1; color: #1a7f37; border: 1px solid #4ac26b; font-size:11px; }

.filter-tabs { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 10px; }
.ftab { padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid #d0d7de; background: #f6f8fa; color: #656d76; }
.ftab.active { background: #0969da; color: #fff; border-color: #0969da; }

.tbl-wrap { max-height: 320px; overflow-y: auto; }
.tbl { width: 100%; border-collapse: collapse; font-size: 12px; }
.tbl th { text-align: left; color: #656d76; font-weight: 600; padding: 6px 8px; border-bottom: 2px solid #d0d7de; position: sticky; top: 0; background: #fff; z-index: 1; }
.tbl td { padding: 6px 8px; border-bottom: 1px solid #f6f8fa; }
.tbl tr:hover td { background: #f6f8fa; }

.search { background: #f6f8fa; border: 1px solid #d0d7de; border-radius: 6px; padding: 7px 10px; color: #1f2328; font-size: 12px; width: 100%; margin-bottom: 10px; }
.search:focus { outline: none; border-color: #0969da; box-shadow: 0 0 0 3px rgba(9,105,218,0.12); }

.loading { text-align: center; padding: 32px; color: #8c959f; font-size: 13px; }
.spin { display: inline-block; width: 16px; height: 16px; border: 2px solid #d0d7de; border-top-color: #0969da; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: #d0d7de; border-radius: 2px; }
</style>
</head>
<body>
<div style="max-width:1400px;margin:0 auto">

  <div class="header">
    <div>
      <h1>🎯 Job Hunt Dashboard</h1>
      <div class="sub">Parth Thakkar · Tracker data + live Gmail</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:12px;color:#8c959f">Updated: <span id="ts"></span></span>
      <button class="btn" onclick="fullRefresh()">↺ Refresh</button>
    </div>
  </div>

  <div class="stats" id="stats"></div>

  <div class="grid-2">
    <div class="card">
      <div class="card-hd">Applications Over Time</div>
      <div class="chart-wrap"><canvas id="ct"></canvas></div>
    </div>
    <div class="card">
      <div class="card-hd">By Sector</div>
      <div class="chart-wrap"><canvas id="cs"></canvas></div>
    </div>
  </div>

  <div class="grid-3-2">
    <div class="card">
      <div class="card-hd">Recent Job Emails <span class="live-badge">● Live</span></div>
      <div class="filter-tabs" id="ftabs"></div>
      <div id="emails"><div class="loading"><span class="spin"></span>Loading emails...</div></div>
    </div>
    <div class="card">
      <div class="card-hd">Target Companies <span style="font-size:12px;color:#8c959f;font-weight:400" id="tgt-count"></span></div>
      <input class="search" id="tgt-q" placeholder="Search companies or sector..." oninput="filterTargets(this.value)">
      <div class="tbl-wrap" id="tbl-tgt"></div>
    </div>
  </div>

</div>

// Stats
function renderStats() {
  const total = APPS.length;
  const applied = APPS.filter(a => a.Status === 'Applied').length;
  const rejected = APPS.filter(a => a.Status === 'Rejected').length;
  const rRate = total > 0 ? Math.round(rejected / total * 100) : 0;
  const targLeft = TARGETS.filter(t => t['Applied?'] !== 'Yes').length;
  [
    ['Total Applications', total, 'across all roles', '#0969da'],
    ['Active', applied, 'awaiting response', '#9a6700'],
    ['Rejected', rejected, 'declined after review', '#cf222e'],
    ['Rejection Rate', rRate + '%', 'of total applications', '#d1242f'],
    ['Targets Remaining', targLeft, 'companies to apply to', '#1a7f37'],
  ].forEach(([lbl,val,sub,color]) => {
    const el = document.createElement('div');
    el.className = 'stat';
    el.innerHTML = `<div class="lbl">${lbl}</div><div class="val" style="color:${color}">${val}</div><div class="sub">${sub}</div>`;
    document.getElementById('stats').appendChild(el);
  });
}

// Charts
Chart.defaults.font.family = '-apple-system, BlinkMacSystemFont, sans-serif';
function renderCharts() {
  const byDate = {};
  APPS.forEach(a => { const d = a['Date Applied'] || '?'; byDate[d] = (byDate[d]||0)+1; });
  const dates = Object.keys(byDate).sort();
  new Chart(document.getElementById('ct'), {
    type: 'bar',
    data: { labels: dates, datasets: [{ data: dates.map(d => byDate[d]), backgroundColor: 'rgba(9,105,218,0.25)', borderColor: '#0969da', borderWidth: 1.5, borderRadius: 4 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { font: { size: 10 }, maxRotation: 40 }, grid: { color: '#f0f0f0' } },
        y: { ticks: { stepSize: 1 }, grid: { color: '#f0f0f0' }, beginAtZero: true }
      }
    }
  });

  const bySector = {};
  APPS.forEach(a => { const s = ((a.Sector || 'Other').split('/')[0]).trim(); bySector[s] = (bySector[s]||0)+1; });
  const entries = Object.entries(bySector).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const PAL = ['#0969da','#1a7f37','#9a6700','#cf222e','#8250df','#0550ae','#bf3989','#1b7c83'];
  new Chart(document.getElementById('cs'), {
    type: 'doughnut',
    data: { labels: entries.map(e=>e[0]), datasets: [{ data: entries.map(e=>e[1]), backgroundColor: PAL, borderWidth: 2, borderColor: '#fff', hoverOffset: 8 }] },
    options: { responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'right', labels: { font: { size: 11 }, boxWidth: 10, padding: 8 } } }
    }
  });
}

  document.getElementById('tbl-tgt').innerHTML = `

      <thead><tr><th>Company</th><th>Sector</th><th>Size</th><th>Status</th></tr></thead>

      </tbody>
    </table>`;
}
function filterTargets(q) {
  const ql = q.toLowerCase();
  renderTargetsTbl(ql ? TARGETS.filter(t => t.Company.toLowerCase().includes(ql) || (t.Sector||'').toLowerCase().includes(ql) || (t.Size||'').toLowerCase().includes(ql)) : TARGETS);
}

// Emails
let allEmails = [], activeFilter = 'All';
function classify(subject, snippet) {
  const sl=(subject||'').toLowerCase(), sn=(snippet||'').toLowerCase();
  if (sn.includes('regret')||sn.includes('unfortunately')||sn.includes('other candidates')||sn.includes('not moving forward')||sn.includes('have decided not')||sl.includes('rejection')) return ['rejected','❌ Rejected'];
  if (sl.includes('interview')||sn.includes('interview')||sn.includes('phone screen')||sn.includes('next step')||sn.includes('schedule a call')) return ['interview','📞 Interview'];
  if (sl.includes('offer')||sn.includes('happy to offer')||sn.includes('pleased to offer')) return ['offer','🎉 Offer'];
  if (sn.includes('received your application')||sn.includes('thank you for applying')||sn.includes('application has been received')||sn.includes('application is officially')) return ['applied','✅ Applied'];
  return ['new','📬 Update'];
}
function renderEmailList() {
  const fil = activeFilter==='All' ? allEmails : allEmails.filter(e=>e.cls===activeFilter);
  if (!fil.length) { document.getElementById('emails').innerHTML='<div class="loading">No emails for this filter</div>'; return; }
  document.getElementById('emails').innerHTML = '<div class="email-list">'+fil.map(e=>`
    <div class="email-item">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
        <div style="flex:1;min-width:0">
          <div class="email-subj">${e.subject}</div>
          <div class="email-snip">${e.snip}</div>
          <div class="email-meta">${e.date} · ${e.from}</div>
        </div>
        <span class="badge b-${e.cls}">${e.lbl}</span>
      </div>
    </div>`).join('')+'</div>';
}
function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.ftab').forEach(t => t.classList.toggle('active', t.dataset.f===f));
  renderEmailList();
}
async function loadEmails() {
  document.getElementById('emails').innerHTML='<div class="loading"><span class="spin"></span>Loading emails...</div>';
  try {
    const r = await window.cowork.callMcpTool('mcp__d95b592f-88ef-4cfb-ba63-2eff72710b5e__search_threads',
      { query: 'subject:(application OR interview OR "thank you for applying" OR offer OR rejection OR "next steps" OR "phone screen" OR "moving forward" OR unfortunately) newer_than:7d', pageSize: 25 });
    const data = r.structuredContent ?? JSON.parse(r.content[0].text);
    const threads = data.threads || [];
    allEmails = threads.map(t => {
      const msg = t.messages[t.messages.length-1];
      const [cls,lbl] = classify(msg.subject, msg.snippet);
      return {
        subject: msg.subject||'(no subject)',
        snip: (msg.snippet||'').substring(0,90),
        date: new Date(msg.date).toLocaleDateString('en-US',{month:'short',day:'numeric'}),
        from: (msg.sender||'').split('@')[0].replace(/^no-?reply$/i,'') || msg.sender,
        cls, lbl
      };
    });
    const counts = {All: allEmails.length};
    allEmails.forEach(e => { counts[e.cls] = (counts[e.cls]||0)+1; });
    const TABS = [['All','All'],['applied','✅ Applied'],['interview','📞 Interview'],['rejected','❌ Rejected'],['offer','🎉 Offer']];
    document.getElementById('ftabs').innerHTML = TABS.filter(([k])=>k==='All'||counts[k]>0).map(([k,l])=>`
      <span class="ftab ${activeFilter===k?'active':''}" data-f="${k}" onclick="setFilter('${k}')">${l} ${counts[k]||''}</span>`).join('');
    if (!allEmails.length) { document.getElementById('emails').innerHTML='<div class="loading">No job emails in the last 7 days 🎉</div>'; return; }
    renderEmailList();
  } catch(e) {
    document.getElementById('emails').innerHTML=`<div style="color:#cf222e;padding:16px;font-size:13px">⚠️ ${e.message}</div>`;
  }
}
async function fullRefresh() {
  document.getElementById('ts').textContent = new Date().toLocaleTimeString();
  await loadEmails();
}
