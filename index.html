<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Hunt Dashboard</title>
<style>
:root { color-scheme: light; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f6f8fa; color: #1f2328; padding: 20px; }
.wrap { max-width: 1400px; margin: 0 auto; }
.header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
.header h1 { font-size: 20px; font-weight: 700; }
.header .sub { font-size: 13px; color: #656d76; margin-top: 3px; }
.btn { background: #f6f8fa; border: 1px solid #d0d7de; color: #24292f; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; }
.btn:hover { background: #eaeef2; }
.stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 20px; }
.stat { background: #fff; border: 1px solid #d0d7de; border-radius: 10px; padding: 16px; }
.stat .lbl { font-size: 11px; color: #656d76; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
.stat .val { font-size: 28px; font-weight: 700; margin: 6px 0 2px; }
.stat .sub { font-size: 11px; color: #8c959f; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.grid-3-2 { display: grid; grid-template-columns: 3fr 2fr; gap: 12px; margin-top: 12px; }
.card { background: #fff; border: 1px solid #d0d7de; border-radius: 10px; padding: 16px; }
.card-hd { font-size: 14px; font-weight: 600; color: #1f2328; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; }
.chart-wrap { position: relative; height: 200px; }
.tbl-wrap { max-height: 320px; overflow-y: auto; }
.tbl { width: 100%; border-collapse: collapse; font-size: 12px; }
.tbl th { text-align: left; color: #656d76; font-weight: 600; padding: 6px 8px; border-bottom: 2px solid #d0d7de; position: sticky; top: 0; background: #fff; z-index: 1; }
.tbl td { padding: 6px 8px; border-bottom: 1px solid #f6f8fa; }
.tbl tr:hover td { background: #f6f8fa; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.b-yes { background: #dafbe1; color: #1a7f37; border: 1px solid #4ac26b; }
.search { background: #f6f8fa; border: 1px solid #d0d7de; border-radius: 6px; padding: 7px 10px; color: #1f2328; font-size: 12px; width: 100%; margin-bottom: 10px; }
.search:focus { outline: none; border-color: #0969da; box-shadow: 0 0 0 3px rgba(9,105,218,.12); }
.loading { text-align: center; padding: 60px; color: #8c959f; }
.spin { display: inline-block; width: 20px; height: 20px; border: 2px solid #d0d7de; border-top-color: #0969da; border-radius: 50%; animation: spin .8s linear infinite; vertical-align: middle; margin-right: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }
::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: #d0d7de; border-radius: 2px; }
@media (max-width: 768px) {
  .stats { grid-template-columns: repeat(2, 1fr); }
  .grid-2, .grid-3-2 { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div>
      <h1>🎯 Job Hunt Dashboard</h1>
      <div class="sub">Parth Thakkar · Auto-updated daily · <span id="generated"></span></div>
    </div>
    <button class="btn" onclick="location.reload()">↺ Refresh</button>
  </div>
  <div id="root"><div class="loading"><span class="spin"></span>Loading dashboard...</div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<script>
let ALL_TARGETS = [];

async function init() {
  const r = await fetch('./data.json?t=' + Date.now());
  if (!r.ok) { document.getElementById('root').innerHTML = '<div class="loading">⚠️ data.json not found — run update_dashboard.py first</div>'; return; }
  const d = await r.json();

  document.getElementById('generated').textContent = 'Data from ' + new Date(d.generated).toLocaleDateString('en-US', {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});

  // Stats
  const s = d.stats;
  const CARDS = [
    ['Total Applications', s.total, 'all roles submitted', '#0969da'],
    ['Active', s.applied, 'awaiting response', '#9a6700'],
    ['Rejected', s.rejected, 'declined after review', '#cf222e'],
    ['Rejection Rate', s.rejectionRate + '%', 'of total applications', '#d1242f'],
    ['Targets Remaining', s.targetsRemaining, 'companies to apply to', '#1a7f37'],
  ];
  const statsHtml = CARDS.map(([lbl,val,sub,color]) =>
    `<div class="stat"><div class="lbl">${lbl}</div><div class="val" style="color:${color}">${val}</div><div class="sub">${sub}</div></div>`
  ).join('');

  ALL_TARGETS = d.targets || [];

  document.getElementById('root').innerHTML = `
    <div class="stats">${statsHtml}</div>
    <div class="grid-2">
      <div class="card"><div class="card-hd">Applications Over Time</div><div class="chart-wrap"><canvas id="ct"></canvas></div></div>
      <div class="card"><div class="card-hd">By Sector</div><div class="chart-wrap"><canvas id="cs"></canvas></div></div>
    </div>
    <div class="grid-3-2">
      <div class="card">
        <div class="card-hd">All Applications</div>
        <input class="search" id="app-q" placeholder="Search company or role..." oninput="filterApps(this.value,d.apps)">
        <div class="tbl-wrap" id="apps-tbl"></div>
      </div>
      <div class="card">
        <div class="card-hd">Target Companies <span style="font-size:12px;color:#8c959f;font-weight:400" id="tgt-ct"></span></div>
        <input class="search" id="tgt-q" placeholder="Search companies..." oninput="filterTargets(this.value)">
        <div class="tbl-wrap" id="tgt-tbl"></div>
      </div>
    </div>`;

  // Charts
  Chart.defaults.font.family = '-apple-system, BlinkMacSystemFont, sans-serif';
  const dates = Object.keys(d.byDate).sort();
  new Chart(document.getElementById('ct'), {
    type: 'bar',
    data: { labels: dates, datasets: [{ data: dates.map(k=>d.byDate[k]), backgroundColor: 'rgba(9,105,218,.25)', borderColor: '#0969da', borderWidth: 1.5, borderRadius: 4 }] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
      scales: { x:{ticks:{font:{size:10},maxRotation:40},grid:{color:'#f0f0f0'}}, y:{ticks:{stepSize:1},grid:{color:'#f0f0f0'},beginAtZero:true} } }
  });
  const entries = Object.entries(d.bySector).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const PAL = ['#0969da','#1a7f37','#9a6700','#cf222e','#8250df','#0550ae','#bf3989','#1b7c83'];
  new Chart(document.getElementById('cs'), {
    type: 'doughnut',
    data: { labels: entries.map(e=>e[0]), datasets: [{ data: entries.map(e=>e[1]), backgroundColor: PAL, borderWidth:2, borderColor:'#fff', hoverOffset:8 }] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'right',labels:{font:{size:11},boxWidth:10,padding:8}}} }
  });

  renderApps(d.apps);
  renderTargets(ALL_TARGETS);

  // store apps on window for filter
  window._apps = d.apps;
}

function statusBadge(s) {
  const m = {Applied:'background:#fff8c5;color:#9a6700;border:1px solid #d4a72c',Rejected:'background:#ffebe9;color:#cf222e;border:1px solid #ff8182',
    'Phone Screen':'background:#dafbe1;color:#1a7f37;border:1px solid #4ac26b','Technical Interview':'background:#dafbe1;color:#1a7f37;border:1px solid #4ac26b',
    Onsite:'background:#ddf4ff;color:#0969da;border:1px solid #54aff9',Offer:'background:#dafbe1;color:#1a7f37;border:1px solid #4ac26b'};
  return `<span class="badge" style="${m[s]||'background:#f6f8fa;color:#656d76;border:1px solid #d0d7de'}">${s||'—'}</span>`;
}

function renderApps(apps) {
  document.getElementById('apps-tbl').innerHTML = `<table class="tbl">
    <thead><tr><th>Company</th><th>Role</th><th>Date</th><th>Status</th></tr></thead>
    <tbody>${apps.map(a=>`<tr>
      <td style="font-weight:500">${a.Company}</td>
      <td style="color:#656d76;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.Role||'—'}</td>
      <td style="color:#656d76;white-space:nowrap">${a['Date Applied']||'—'}</td>
      <td>${statusBadge(a.Status)}</td>
    </tr>`).join('')}</tbody></table>`;
}

function filterApps(q) {
  const ql = q.toLowerCase();
  renderApps(ql ? window._apps.filter(a => a.Company.toLowerCase().includes(ql) || (a.Role||'').toLowerCase().includes(ql)) : window._apps);
}

function renderTargets(targets) {
  document.getElementById('tgt-ct').textContent = targets.length + ' companies';
  document.getElementById('tgt-tbl').innerHTML = `<table class="tbl">
    <thead><tr><th>Company</th><th>Sector</th><th>Size</th><th>Status</th></tr></thead>
    <tbody>${targets.map(t=>`<tr>
      <td style="font-weight:500">${t.Company}</td>
      <td style="color:#656d76">${t.Sector||'—'}</td>
      <td style="color:#656d76">${t.Size||'—'}</td>
      <td>${t['Applied?']==='Yes'?'<span class="badge b-yes">✓ Applied</span>':'<span style="color:#8c959f">—</span>'}</td>
    </tr>`).join('')}</tbody></table>`;
}

function filterTargets(q) {
  const ql = q.toLowerCase();
  renderTargets(ql ? ALL_TARGETS.filter(t => t.Company.toLowerCase().includes(ql)||(t.Sector||'').toLowerCase().includes(ql)) : ALL_TARGETS);
}

init();
</script>
</body>
</html>
